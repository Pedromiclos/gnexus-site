<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GNexus | Marketing Digital</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth}

body{
  font-family:Arial,sans-serif;
  background:#fff;
  color:#111827;
  overflow-x:hidden;
}

/* HEADER */
header{
  padding:18px 8%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(12px);
  border-bottom:1px solid #e5e7eb;
  position:sticky;
  top:0;
  z-index:100;
}

/* LOGO */
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:32px;
  font-weight:900;
}

.logo img{
  width:50px;
  height:50px;
  object-fit:contain;
  filter: drop-shadow(0 0 6px rgba(37,99,235,0.5));
}

.logo span{
  color:#2563eb;
}

/* MENU */
nav a{
  margin-left:24px;
  text-decoration:none;
  color:#374151;
  font-weight:bold;
  position:relative;
}

nav a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-6px;
  width:0;
  height:2px;
  background:#2563eb;
  transition:.3s;
}

nav a:hover::after{
  width:100%;
}

/* HERO */
.hero{
  padding:130px 8%;
  text-align:center;
  color:white;
  background:linear-gradient(135deg,#020617,#1e3a8a,#2563eb);
}

.hero h1{
  font-size:52px;
}

.hero p{
  margin:20px auto;
  max-width:700px;
  color:#e5e7eb;
}

/* BOTÃO */
.botao{
  display:inline-block;
  margin-top:20px;
  background:#fff;
  color:#1d4ed8;
  padding:15px 28px;
  border-radius:12px;
  text-decoration:none;
  font-weight:bold;
  transition:.3s;
}

.botao:hover{
  transform:translateY(-5px);
}

/* SEÇÕES */
section{
  padding:80px 8%;
}

.titulo{
  text-align:center;
  font-size:32px;
  margin-bottom:20px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:white;
  padding:25px;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* FOOTER */
footer{
  background:#020617;
  color:white;
  padding:30px;
  text-align:center;
}

/* BOTÕES FIXOS */
.whatsapp-fixo{
  position:fixed;
  right:22px;
  bottom:22px;
  width:58px;
  height:58px;
  background:#25d366;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.25);
  animation:pulsar 1.8s infinite;
  z-index:999;
}

.instagram-fixo{
  position:fixed;
  right:22px;
  bottom:95px;
  width:58px;
  height:58px;
  background:#e1306c;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.25);
  animation:pulsarInsta 1.8s infinite;
  z-index:999;
}

.instagram-fixo img,
.whatsapp-fixo img{
  width:30px;
}

/* ANIMAÇÕES */
@keyframes pulsar{
  0%{box-shadow:0 0 0 0 rgba(37,211,102,0.6);}
  70%{box-shadow:0 0 0 18px rgba(37,211,102,0);}
  100%{box-shadow:0 0 0 0 rgba(37,211,102,0);}
}

@keyframes pulsarInsta{
  0%{box-shadow:0 0 0 0 rgba(225,48,108,0.6);}
  70%{box-shadow:0 0 0 18px rgba(225,48,108,0);}
  100%{box-shadow:0 0 0 0 rgba(225,48,108,0);}
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="logo.png" alt="Logo GNexus">
    GN<span>exus</span>
  </div>

  <nav>
    <a href="#servicos">Serviços</a>
  </nav>
</header>

<section class="hero">
  <h1>Marketing digital que gera resultado</h1>
  <p>Ajudamos empresas a crescer com estratégias digitais profissionais.</p>

  <a class="botao" href="https://wa.me/557798209467" target="_blank">
    Receber proposta
  </a>
</section>

<section id="servicos">
  <h2 class="titulo">Serviços</h2>

  <div class="cards">
    <div class="card">Landing Pages</div>
    <div class="card">Marketing Digital</div>
    <div class="card">Influenciadores</div>
    <div class="card">Presença Online</div>
  </div>
</section>

<footer>
  <strong>GNexus</strong>
  <p>Marketing digital e conexão entre marcas.</p>
</footer>

<!-- INSTAGRAM -->
<a class="instagram-fixo" href="https://www.instagram.com/g.nexus7" target="_blank">
  <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png">
</a>

<!-- WHATSAPP -->
<a class="whatsapp-fixo" href="https://wa.me/557798209467" target="_blank">
  <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
</a>

</body>
</html>
